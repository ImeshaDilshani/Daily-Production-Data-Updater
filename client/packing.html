<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Packing Item and Type</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <h1>Select Packing Item and Type</h1>
    <label for="packingItems">Packing Item:</label>
    <select id="packingItems">
        <option value="">Select Packing Item</option>
    </select>
    <br>
    <label for="packingTypes">Packing Type:</label>
    <select id="packingTypes">
        <option value="">Select Packing Type</option>
    </select>
    <br>
    <button id="submitBtn">Submit</button>

    <table id="resultsTable" style="display:none;">
        <thead>
            <tr>
                <th>SAP Code</th>
                <th>Packing Item</th>
                <th>Packing Type</th>
                <th>Description</th>
                <th>Line</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="JS/packing.js"></script>
</body>
</html>
