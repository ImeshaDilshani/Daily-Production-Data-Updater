<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Task Form</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <h1>Operator Information</h1>
    <form id="taskForm">
        <label for="line">Line:</label>
        <select id="line" name="line" required>
            <option value="">Select line</option>
        </select>
        
        <label for="epfNumber">EPF Number:</label>
        <select id="epfNumber" name="epfNumber" required>
            <option value="">Select EPF Number</option>
        </select>
        
        <label for="fullName">Full Name:</label>
        <select id="fullName" name="fullName" required>
            <option value="">Select Full Name</option>
        </select>

        <button type="submit">Submit</button>
    </form>
    <button id="nextPageBtn">Next Page</button>

    <script src="JS/script.js"></script>
    <script src="JS/employees.js"></script>
</body>
</html>
